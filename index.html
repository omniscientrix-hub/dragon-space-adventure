<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Space Adventure</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>🐉 Dragon Space Adventure</h1>
            <div class="stats">
                <div class="stat">Score: <span id="score">0</span></div>
                <div class="stat">Lives: <span id="lives">3</span></div>
                <div class="stat">Distance: <span id="distance">0</span>%</div>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="gameOverScreen" class="modal hidden">
            <div class="modal-content">
                <h2 id="gameOverTitle">Game Over!</h2>
                <p id="gameOverMessage"></p>
                <p class="final-score">Final Score: <span id="finalScore">0</span></p>
                <button onclick="location.reload()">Play Again</button>
            </div>
        </div>

        <div class="controls-info">
            <p>📱 <strong>Touch & Drag</strong> to move your dragon | 🖥️ <strong>Mouse</strong> to fly</p>
        </div>

        <footer>
            <p>&copy; Cornelius Aurelius 2026</p>
        </footer>
    </div>

    <script src="game.js"></script>
</body>
</html>
